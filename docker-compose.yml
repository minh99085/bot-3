# Hermes v2 Paper — 24/7 VPS stack (paper mode only)
# Dashboard: http://<VPS_IP>/dashboard  (nginx → streamlit; 8501 not public)

name: hermes-paper

services:
  bot:
    build: .
    image: hermes-paper:latest
    container_name: hermes-bot
    restart: unless-stopped
    command: ["scripts/docker_entrypoint_bot.sh"]
    env_file:
      - .env
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "${HERMES_CAPITAL:-2000}"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_LOG_DIR: /app/logs
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs:/app/logs
    # Health only on internal network — not published to host
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "scripts/healthcheck_bot.sh"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  dashboard:
    build: .
    image: hermes-paper:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["scripts/docker_entrypoint_dashboard.sh"]
    env_file:
      - .env
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "${HERMES_CAPITAL:-2000}"
      HERMES_LOG_DIR: /app/logs
      STREAMLIT_SERVER_BASE_URL_PATH: dashboard
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.streamlit:/app/.streamlit:ro
    # Streamlit stays private — only nginx reaches it
    expose:
      - "8501"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8501/dashboard/_stcore/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      bot:
        condition: service_started
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "${HERMES_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  hermes:
    driver: bridge
