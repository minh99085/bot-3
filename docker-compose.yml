# Hermes v2 Paper — 5 isolated instances × $2k (= $10k fleet) + shared dashboard
# Dashboard: http://<VPS_IP>/dashboard  (nginx → streamlit; 8501 not public)
#
# Instances:
#   hermes-btc5     MARKET_FILTER=btc5     → BTC 5m Up/Down only
#   hermes-btc15    MARKET_FILTER=btc15    → BTC 15m Up/Down only
#   hermes-eth5     MARKET_FILTER=eth5     → ETH 5m Up/Down only
#   hermes-sol5     MARKET_FILTER=sol5     → SOL 5m Up/Down only
#   hermes-rotator  MARKET_FILTER=rotator  → scans all four; 1 highest-conviction trade
#
# Start everything:
#   docker compose up -d --build

name: hermes-paper

x-bot-common: &bot-common
  build: .
  image: hermes-paper:latest
  restart: unless-stopped
  command: ["scripts/docker_entrypoint_bot.sh"]
  env_file:
    - .env
  expose:
    - "8080"
  healthcheck:
    test: ["CMD", "scripts/healthcheck_bot.sh"]
    interval: 60s
    timeout: 10s
    retries: 3
    start_period: 90s
  networks:
    - hermes
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:
  hermes-btc5:
    <<: *bot-common
    container_name: hermes-btc5
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: btc5
      MARKET_FILTER: btc5
      HERMES_LOG_DIR: /app/logs/btc5
      HERMES_PAPER_DIR: /app/data/paper/btc5
      HERMES_HANDOFF_DIR: /app/data/handoff/btc5
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/btc5:/app/logs/btc5
      - ./artifacts/btc5:/app/artifacts/btc5
      - ./config:/app/config:ro

  hermes-btc15:
    <<: *bot-common
    container_name: hermes-btc15
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: btc15
      MARKET_FILTER: btc15
      HERMES_LOG_DIR: /app/logs/btc15
      HERMES_PAPER_DIR: /app/data/paper/btc15
      HERMES_HANDOFF_DIR: /app/data/handoff/btc15
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/btc15:/app/logs/btc15
      - ./artifacts/btc15:/app/artifacts/btc15
      - ./config:/app/config:ro

  hermes-eth5:
    <<: *bot-common
    container_name: hermes-eth5
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: eth5
      MARKET_FILTER: eth5
      HERMES_LOG_DIR: /app/logs/eth5
      HERMES_PAPER_DIR: /app/data/paper/eth5
      HERMES_HANDOFF_DIR: /app/data/handoff/eth5
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/eth5:/app/logs/eth5
      - ./artifacts/eth5:/app/artifacts/eth5
      - ./config:/app/config:ro

  hermes-sol5:
    <<: *bot-common
    container_name: hermes-sol5
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: sol5
      MARKET_FILTER: sol5
      HERMES_LOG_DIR: /app/logs/sol5
      HERMES_PAPER_DIR: /app/data/paper/sol5
      HERMES_HANDOFF_DIR: /app/data/handoff/sol5
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/sol5:/app/logs/sol5
      - ./artifacts/sol5:/app/artifacts/sol5
      - ./config:/app/config:ro

  hermes-rotator:
    <<: *bot-common
    container_name: hermes-rotator
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_INTERVAL: "${HERMES_INTERVAL:-300}"
      HERMES_INSTANCE_ID: rotator
      MARKET_FILTER: rotator
      HERMES_LOG_DIR: /app/logs/rotator
      HERMES_PAPER_DIR: /app/data/paper/rotator
      HERMES_HANDOFF_DIR: /app/data/handoff/rotator
      HERMES_HEALTH_PORT: "8080"
      HERMES_FORCE_SYNTHETIC: "${HERMES_FORCE_SYNTHETIC:-0}"
      HERMES_SCOPE_BTC_UPDOWN_ONLY: "1"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs/rotator:/app/logs/rotator
      - ./artifacts/rotator:/app/artifacts/rotator
      - ./config:/app/config:ro

  dashboard:
    build: .
    image: hermes-paper:latest
    container_name: hermes-dashboard
    restart: unless-stopped
    command: ["scripts/docker_entrypoint_dashboard.sh"]
    env_file:
      - .env
    environment:
      HERMES_PAPER_ONLY: "1"
      HERMES_LIVE: "0"
      HERMES_CAPITAL: "2000"
      HERMES_LOG_DIR: /app/logs
      STREAMLIT_SERVER_BASE_URL_PATH: dashboard
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_PORT: "8501"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
    volumes:
      - ./knowledge:/app/knowledge
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.streamlit:/app/.streamlit:ro
      - ./config:/app/config:ro
    expose:
      - "8501"
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8501/dashboard/_stcore/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    depends_on:
      hermes-btc5:
        condition: service_started
      hermes-btc15:
        condition: service_started
      hermes-eth5:
        condition: service_started
      hermes-sol5:
        condition: service_started
      hermes-rotator:
        condition: service_started
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    container_name: hermes-nginx
    restart: unless-stopped
    ports:
      - "${HERMES_HTTP_PORT:-80}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      dashboard:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      - hermes
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "3"

networks:
  hermes:
    driver: bridge
