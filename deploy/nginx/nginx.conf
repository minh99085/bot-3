# Hermes v2 Paper — nginx reverse proxy
# Public: http://<VPS_IP>/dashboard  →  Streamlit (internal :8501)
# Streamlit port 8501 is NEVER published to the host.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    server_tokens off;

    # WebSocket upgrade map for Streamlit
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    log_format hermes '$remote_addr - $remote_user [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log hermes;

    upstream hermes_dashboard {
        server dashboard:8501;
        keepalive 8;
    }

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        client_max_body_size 8m;

        # Liveness for compose / load balancers
        location = /healthz {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'ok\n';
        }

        # Clean entry: root → dashboard
        location = / {
            return 302 /dashboard/;
        }

        location = /dashboard {
            return 301 /dashboard/;
        }

        # Streamlit behind /dashboard (baseUrlPath=dashboard)
        location /dashboard/ {
            proxy_pass http://hermes_dashboard/dashboard/;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /dashboard;

            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            proxy_buffering off;
            proxy_redirect off;
        }

        # Block anything else (no stray ports, no static root)
        location / {
            return 404 'Hermes Paper — use /dashboard\n';
        }
    }
}
